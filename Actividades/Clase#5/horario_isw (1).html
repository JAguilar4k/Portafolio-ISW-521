<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horario ISW</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #080c18;
      background-image:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(30, 60, 140, 0.35) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 90%, rgba(10, 120, 100, 0.2) 0%, transparent 55%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      font-family: 'Syne', sans-serif;
    }

    /* Noise overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 780px;
    }

    /* ── Header ── */
    .header {
      margin-bottom: 32px;
      animation: fadeDown 0.7s ease both;
    }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #f0c030, #f07020);
      color: #080c18;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 4px;
      margin-bottom: 14px;
    }

    h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -0.5px;
      line-height: 1.1;
    }

    h1 span {
      background: linear-gradient(90deg, #38e8c0, #4da6ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      margin-top: 8px;
      font-size: 14px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.3px;
    }

    /* ── Table card ── */
    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      overflow: hidden;
      backdrop-filter: blur(16px);
      box-shadow:
        0 0 0 1px rgba(70,150,255,0.08),
        0 24px 80px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.06);
      animation: fadeUp 0.8s 0.15s ease both;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    /* ── Head ── */
    thead tr {
      background: linear-gradient(135deg, rgba(40,80,180,0.6), rgba(20,120,100,0.4));
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    thead th {
      padding: 18px 24px;
      text-align: left;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.9);
    }

    thead th:first-child {
      color: rgba(255,255,255,0.5);
    }

    /* ── Body rows ── */
    tbody tr {
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: background 0.25s ease;
      animation: rowIn 0.5s ease both;
    }

    tbody tr:nth-child(1) { animation-delay: 0.3s; }
    tbody tr:nth-child(2) { animation-delay: 0.45s; }
    tbody tr:nth-child(3) { animation-delay: 0.6s; }

    tbody tr:hover {
      background: rgba(70,150,255,0.06);
    }

    tbody tr:last-child {
      border-bottom: none;
    }

    tbody td {
      padding: 20px 24px;
      font-size: 14px;
      vertical-align: middle;
    }

    /* Time cell */
    .time {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      font-size: 15px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    /* Course pill */
    .course {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.5px;
      color: #38e8c0;
      background: rgba(56, 232, 192, 0.08);
      border: 1px solid rgba(56, 232, 192, 0.2);
      padding: 6px 12px;
      border-radius: 8px;
      transition: all 0.2s ease;
    }

    .course::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #38e8c0;
      box-shadow: 0 0 6px #38e8c0;
      flex-shrink: 0;
    }

    tbody tr:hover .course {
      background: rgba(56, 232, 192, 0.14);
      box-shadow: 0 0 16px rgba(56, 232, 192, 0.12);
    }

    /* Libre */
    .libre {
      font-size: 13px;
      color: rgba(255,255,255,0.22);
      font-style: italic;
    }

    /* Receso row */
    tr.receso-row {
      background: rgba(240,180,20,0.04);
    }

    tr.receso-row:hover {
      background: rgba(240,180,20,0.08);
    }

    .receso-cell {
      position: relative;
      text-align: center;
      overflow: hidden;
    }

    .receso-inner {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(135deg, rgba(240,180,20,0.15), rgba(240,100,20,0.1));
      border: 1px solid rgba(240,180,20,0.3);
      border-radius: 10px;
      padding: 10px 28px;
      width: 100%;
    }

    .receso-icon {
      font-size: 16px;
    }

    .receso-label {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #f0c030, #f07020);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .receso-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: rgba(240,180,20,0.5);
      letter-spacing: 0.5px;
    }

    /* Shimmer on receso */
    .receso-inner::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(240,200,80,0.08), transparent);
      animation: shimmer 3s 1.2s infinite;
    }

    /* Footer */
    .footer {
      margin-top: 18px;
      text-align: right;
      font-size: 11px;
      color: rgba(255,255,255,0.15);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.5px;
      animation: fadeUp 0.8s 0.7s ease both;
    }

    /* ── Animations ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes rowIn {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @keyframes shimmer {
      0%   { left: -100%; }
      50%  { left: 150%; }
      100% { left: 150%; }
    }
  </style>
</head>
<body>
  <div class="wrapper">

    <div class="header">
      <div class="badge">⚡ Actividad</div>
      <h1>Tema 5: <span>Tablas</span></h1>
      <p class="subtitle">Horario de clases — Ingeniería de Software</p>
    </div>

    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Hora</th>
            <th>Lunes</th>
            <th>Martes</th>
            <th>Miércoles</th>
          </tr>
        </thead>
        <tbody>

          <!-- 7:00 -->
          <tr>
            <td class="time">7:00</td>
            <td><span class="course">ISW-521</span></td>
            <td><span class="course">ISW-311</span></td>
            <td><span class="libre">Libre</span></td>
          </tr>

          <!-- 9:00 Receso colspan=3 -->
          <tr class="receso-row">
            <td class="time">9:00</td>
            <td class="receso-cell" colspan="3">
              <div class="receso-inner">
                <span class="receso-icon">☕</span>
                <span class="receso-label">Receso</span>
                <span class="receso-tag">colspan=3</span>
              </div>
            </td>
          </tr>

          <!-- 10:00 -->
          <tr>
            <td class="time">10:00</td>
            <td><span class="course">ISW-421</span></td>
            <td><span class="course">ISW-521</span></td>
            <td><span class="course">ISW-311</span></td>
          </tr>

        </tbody>
      </table>
    </div>

    <p class="footer">ISW · Primer Semestre · 2026</p>
  </div>
</body>
</html>
