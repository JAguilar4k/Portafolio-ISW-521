<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reto Final — ISW-521</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6f8;
      padding: 2rem;
      color: #333;
    }
    h1 { margin-bottom: 1.5rem; color: #1a1a2e; }
    #lista-productos {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-width: 400px;
    }
    .producto-item {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .nombre { color: #444; }
    .precio { color: #2a7a2a; font-size: 1.05rem; }
    #total {
      margin-top: 1.25rem;
      font-size: 1.2rem;
      font-weight: bold;
      color: #1a1a2e;
    }
  </style>
</head>
<body>
  <h1>🛒 Mi Carrito Modular</h1>
  <ul id="lista-productos"></ul>
  <p id="total"></p>

  <!--
    Vite reemplaza este script en build por los bundles optimizados.
    En desarrollo, type="module" habilita HMR (Hot Module Replacement).
  -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
